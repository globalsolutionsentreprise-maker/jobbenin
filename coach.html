<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach IA Emploi — Talenco.bj</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/design-system.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --green:       #16a34a;
      --green-dark:  #15803d;
      --green-light: #dcfce7;
      --green-mid:   #86efac;
      --purple:      #7c3aed;
      --purple-light:#f5f3ff;
      --text:        #111827;
      --text-muted:  #6b7280;
      --border:      #e5e7eb;
      --bg:          #f9fafb;
      --white:       #ffffff;
      --radius:      12px;
      --header-h:    60px;
      --input-h:     80px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .header-logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--green);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .header-logo span { font-size: 20px; }
    .header-title {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-badge {
      background: var(--purple-light);
      color: var(--purple);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-nav a {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .header-nav a:hover { background: var(--bg); }
    .btn-new-conv {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-new-conv:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── Messages ──────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 16px 16px 8px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* Suggestions (état initial) */
    .suggestions-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - var(--header-h) - var(--input-h) - 32px);
      gap: 24px;
      padding: 20px 0;
    }
    .suggestions-avatar {
      width: 64px; height: 64px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: var(--white);
      box-shadow: 0 4px 16px rgba(22,163,74,0.25);
    }
    .suggestions-title {
      font-size: 20px; font-weight: 700; color: var(--text); text-align: center;
    }
    .suggestions-sub {
      font-size: 14px; color: var(--text-muted); text-align: center; max-width: 380px;
    }
    .suggestions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%; max-width: 540px;
    }
    .suggestion-btn {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .suggestion-btn:hover {
      border-color: var(--green);
      box-shadow: 0 2px 8px rgba(22,163,74,0.12);
    }
    @media (max-width: 480px) {
      .suggestions-grid { grid-template-columns: 1fr; }
      .suggestions-title { font-size: 17px; }
    }

    /* Bulles de message */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 16px;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--white);
      flex-shrink: 0;
    }
    .msg-row.user .msg-avatar { background: #374151; }

    .msg-bubble {
      max-width: min(480px, 75vw);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.coach .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg-row.user .msg-bubble {
      background: var(--green);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    /* Curseur clignotant pendant le streaming */
    .typing-cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--green);
      border-radius: 1px;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Barre d'input ─────────────────────────────────────────── */
    .input-area {
      height: var(--input-h);
      flex-shrink: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
    }
    .limit-banner {
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #854d0e;
      text-align: center;
      display: none;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.4;
      outline: none;
      transition: border-color 0.15s;
      height: 44px;
      max-height: 120px;
      overflow-y: auto;
    }
    .input-row textarea:focus { border-color: var(--green); }
    .input-row textarea:disabled { background: var(--bg); color: var(--text-muted); }
    .send-btn {
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      font-size: 18px;
    }
    .send-btn:hover:not(:disabled) { background: var(--green-dark); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Compteur messages ────────────────────────────────────── */
    .msg-counter {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
    }
    .msg-counter.warn { color: #d97706; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="header">
  <a href="/index.html" class="header-logo">
    <div class="nav-logo">
      <div class="nav-logo-text">
        <span class="logo-primary">Talenco</span><span class="logo-dot">.</span><span class="logo-tld">bj</span>
      </div>
      <div class="logo-tagline">Recrutement au Bénin</div>
    </div>
  </a>
  <div class="header-title">
    <span class="header-badge">✨ Coach IA</span>
  </div>
  <nav class="header-nav">
    <a href="/offres.html">Offres</a>
    <a href="/candidat.html">Mon profil</a>
  </nav>
  <button class="btn-new-conv" id="btn-new-conv" type="button">
    🔄 Nouvelle conversation
  </button>
</header>

<!-- ── Zone chat ────────────────────────────────────────────────────────── -->
<div class="chat-area" id="chat-area">

  <!-- Suggestions (visible quand l'historique est vide) -->
  <div class="suggestions-wrap" id="suggestions">
    <div class="suggestions-avatar">TB</div>
    <div>
      <div class="suggestions-title">Bonjour, je suis TalBot 👋</div>
      <p class="suggestions-sub">Votre assistant emploi dédié au marché béninois. Comment puis-je vous aider ?</p>
    </div>
    <div class="suggestions-grid">
      <button class="suggestion-btn" data-text="Prépare-moi pour un entretien RH en me posant des questions types.">
        🎯 Prépare-moi pour un entretien RH
      </button>
      <button class="suggestion-btn" data-text="Aide-moi à rédiger une lettre de motivation percutante. Dis-moi d'abord pour quel poste.">
        ✍️ Rédige ma lettre de motivation
      </button>
      <button class="suggestion-btn" data-text="Quels sont les salaires moyens par secteur au Bénin en 2024 ?">
        💰 Salaires moyens au Bénin
      </button>
      <button class="suggestion-btn" data-text="Comment négocier efficacement mon salaire lors d'un entretien au Bénin ?">
        🤝 Négocier mon salaire
      </button>
    </div>
  </div>

</div>

<!-- ── Input bar ─────────────────────────────────────────────────────────── -->
<div class="input-area">
  <div class="limit-banner" id="limit-banner">
    ⏰ Limite quotidienne atteinte (20 messages) — revenez demain pour continuer.
  </div>
  <div class="input-row" id="input-row">
    <textarea
      id="user-input"
      placeholder="Posez votre question à TalBot…"
      rows="1"
      maxlength="2000"
    ></textarea>
    <button class="send-btn" id="send-btn" type="button" title="Envoyer" disabled>➤</button>
  </div>
  <div class="msg-counter" id="msg-counter"></div>
</div>

<!-- ── Scripts ─────────────────────────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  // ── Config ──────────────────────────────────────────────────────────────
  const SUPABASE_URL     = 'https://ywteoxnkkdgdpbkrlkar.supabase.co';
  const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY ?? 'VOTRE_ANON_KEY_ICI';
  const MAX_MESSAGES     = 20;
  const SESSION_KEY      = 'coach-history';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── État ────────────────────────────────────────────────────────────────
  let session       = null;   // Supabase session
  let history       = [];     // [{ role, content }, ...]
  let isStreaming   = false;
  let msgSentToday  = 0;      // compteur local (synchronisé avec la DB)

  // ── DOM ─────────────────────────────────────────────────────────────────
  const chatArea    = document.getElementById('chat-area');
  const suggestions = document.getElementById('suggestions');
  const input       = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const btnNewConv  = document.getElementById('btn-new-conv');
  const limitBanner = document.getElementById('limit-banner');
  const msgCounter  = document.getElementById('msg-counter');

  // ── Auth : rediriger si non connecté ────────────────────────────────────
  async function init() {
    const { data: { session: s } } = await sb.auth.getSession();
    if (!s) {
      window.location.href = '/candidat.html?redirect=coach';
      return;
    }
    session = s;

    // Restaurer l'historique de sessionStorage
    try {
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (saved) {
        history = JSON.parse(saved);
        history.forEach((m) => appendBubble(m.role, m.content));
        hideSuggestions();
      }
    } catch { history = []; }

    updateCounter();
    enableInput();
  }

  // ── Compteur restant ─────────────────────────────────────────────────────
  function updateCounter(remaining) {
    const rem = remaining ?? (MAX_MESSAGES - msgSentToday);
    if (rem <= 5) {
      msgCounter.textContent = `${rem} message${rem > 1 ? 's' : ''} restant${rem > 1 ? 's' : ''} aujourd'hui`;
      msgCounter.className = rem <= 2 ? 'msg-counter warn' : 'msg-counter';
    } else {
      msgCounter.textContent = '';
    }
  }

  function showLimitReached() {
    limitBanner.style.display = 'block';
    document.getElementById('input-row').style.display = 'none';
    msgCounter.textContent = '';
  }

  // ── Suggestions ──────────────────────────────────────────────────────────
  function hideSuggestions() {
    suggestions.style.display = 'none';
  }

  document.querySelectorAll('.suggestion-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      input.value = btn.dataset.text;
      input.dispatchEvent(new Event('input'));
      send();
    });
  });

  // ── Bulles de message ────────────────────────────────────────────────────
  function appendBubble(role, text) {
    const isCoach = role === 'assistant';
    const row = document.createElement('div');
    row.className = `msg-row ${isCoach ? 'coach' : 'user'}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = isCoach ? 'TB' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    scrollBottom();
    return bubble; // retourné pour le streaming
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Input auto-resize ────────────────────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim() || isStreaming;
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });

  function enableInput() {
    input.disabled = false;
    sendBtn.disabled = !input.value.trim();
    input.focus();
  }

  function disableInput() {
    input.disabled = true;
    sendBtn.disabled = true;
  }

  // ── Envoi d'un message ───────────────────────────────────────────────────
  async function send() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    hideSuggestions();
    isStreaming = true;
    disableInput();

    // Bulle utilisateur
    appendBubble('user', text);
    history.push({ role: 'user', content: text });
    saveHistory();

    input.value = '';
    input.style.height = 'auto';

    // Préparer la bulle coach (vide + curseur)
    const coachBubble = appendBubble('assistant', '');
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    coachBubble.appendChild(cursor);

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/coach-ia`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ messages: history }),
      });

      // Limite atteinte
      if (res.status === 429) {
        coachBubble.remove();
        coachBubble.previousSibling?.remove();
        showLimitReached();
        return;
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        coachBubble.textContent = `⚠️ ${err.error ?? 'Erreur — réessayez dans un instant.'}`;
        return;
      }

      // Lire les messages restants dans le header
      const remaining = parseInt(res.headers.get('X-Remaining-Messages') ?? '99', 10);
      msgSentToday = MAX_MESSAGES - remaining;
      updateCounter(remaining);

      // ── Lire le stream SSE ────────────────────────────────────────────
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';
      let fullText  = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const dataStr = line.slice(6).trim();
          if (!dataStr || dataStr === '[DONE]') continue;

          try {
            const event = JSON.parse(dataStr);
            if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
              fullText += event.delta.text;
              // Mettre à jour la bulle en temps réel (curseur toujours à la fin)
              coachBubble.textContent = fullText;
              coachBubble.appendChild(cursor);
              scrollBottom();
            }
          } catch { /* chunk incomplet */ }
        }
      }

      // Retirer le curseur clignotant
      cursor.remove();
      if (!fullText) coachBubble.textContent = "Je n'ai pas pu répondre. Réessayez.";

      // Ajouter la réponse complète à l'historique
      history.push({ role: 'assistant', content: fullText });
      saveHistory();

    } catch (err) {
      cursor.remove();
      coachBubble.textContent = `⚠️ Erreur réseau : ${err.message}`;
    } finally {
      isStreaming = false;
      enableInput();
    }
  }

  sendBtn.addEventListener('click', send);

  // ── Nouvelle conversation ────────────────────────────────────────────────
  btnNewConv.addEventListener('click', () => {
    if (isStreaming) return;
    if (history.length && !confirm('Effacer la conversation en cours ?')) return;

    history = [];
    saveHistory();
    // Supprimer toutes les bulles sauf le bloc suggestions
    chatArea.querySelectorAll('.msg-row').forEach((el) => el.remove());
    suggestions.style.display = '';
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    limitBanner.style.display = 'none';
    document.getElementById('input-row').style.display = '';
    input.focus();
  });

  // ── Persistance sessionStorage ───────────────────────────────────────────
  function saveHistory() {
    try {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(history));
    } catch { /* storage plein */ }
  }

  // ── Lancement ───────────────────────────────────────────────────────────
  init();

})();
</script>

</body>
</html>
