<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — Talenco.bj</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/design-system.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 32px; width: 100%; max-width: 440px; }
    .auth-title { font-family: var(--font-serif); font-style: italic; font-size: 24px; text-align: center; margin-bottom: 6px; }
    .auth-sub { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 24px; }
    .auth-role-tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 20px; }
    .auth-role-btn { flex: 1; padding: 9px; font-family: var(--font-body); font-size: 12px; font-weight: 500; background: none; border: none; cursor: pointer; color: var(--text-muted); transition: background .15s, color .15s; }
    .auth-role-btn.active { background: var(--text); color: var(--bg); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body class="auth-page">

<nav class="navbar">
  <a href="/index.html" class="talenco-logo">
    <div class="nav-logo">
      <div class="nav-logo-text">
        <span class="logo-primary">Talenco</span><span class="logo-dot">.</span><span class="logo-tld">bj</span>
      </div>
      <div class="logo-tagline">Recrutement au Bénin</div>
    </div>
  </a>
  <ul class="navbar-links">
    <li><a href="/offres.html">Offres</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="/connexion.html" class="btn btn-dark btn-sm">Se connecter</a>
  </div>
</nav>

<div class="auth-center">
  <div class="auth-card">
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez Talenco.bj gratuitement</p>

    <div class="auth-role-tabs">
      <button class="auth-role-btn active" id="role-candidat" data-role="candidat">👤 Candidat</button>
      <button class="auth-role-btn" id="role-recruteur" data-role="recruteur">🏢 Recruteur</button>
    </div>

    <div id="auth-msg" class="alert" style="display:none;margin-bottom:16px;"></div>

    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label">Prénom</label>
        <input type="text" id="reg-prenom" placeholder="Votre prénom">
      </div>
      <div class="form-field">
        <label class="form-label">Nom</label>
        <input type="text" id="reg-nom" placeholder="Votre nom">
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">Email</label>
      <input type="email" id="reg-email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div id="reg-entreprise-field" class="form-field" style="display:none;">
      <label class="form-label">Nom de l'entreprise</label>
      <input type="text" id="reg-entreprise" placeholder="Nom de votre entreprise">
    </div>
    <div class="form-field">
      <label class="form-label">Mot de passe</label>
      <input type="password" id="reg-password" placeholder="Minimum 8 caractères" autocomplete="new-password">
    </div>

    <button class="btn btn-dark btn-full" id="btn-register" style="margin-top:8px;">Créer mon compte</button>

    <div class="auth-footer">
      Déjà un compte ? <a href="/connexion.html">Se connecter</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  var SUPABASE_URL     = 'https://ywteoxnkkdgdpbkrlkar.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3dGVveG5ra2RnZHBia3Jsa2FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjA1MjYsImV4cCI6MjA5MDA5NjUyNn0.jzgNVgYR6iCEV_GIpvBTs4aN3RzK3E3MJW9YtBmLI3c';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let selectedRole = 'candidat';

  document.querySelectorAll('.auth-role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.auth-role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRole = btn.dataset.role;
      document.getElementById('reg-entreprise-field').style.display = selectedRole === 'recruteur' ? 'block' : 'none';
    });
  });

  function showMsg(type, text) {
    const el = document.getElementById('auth-msg');
    el.className = `alert alert-${type}`;
    el.textContent = text;
    el.style.display = 'block';
  }

  document.getElementById('btn-register').addEventListener('click', async () => {
    const prenom   = document.getElementById('reg-prenom').value.trim();
    const nom      = document.getElementById('reg-nom').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const entreprise = document.getElementById('reg-entreprise').value.trim();

    if (!email || !password) { showMsg('error', '❌ Email et mot de passe requis.'); return; }
    if (password.length < 8) { showMsg('error', '❌ Le mot de passe doit contenir au moins 8 caractères.'); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = '⏳ Création du compte…';

    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { prenom, nom, role: selectedRole, entreprise: entreprise || null } },
    });

    if (error) {
      showMsg('error', '❌ ' + error.message);
      btn.disabled = false; btn.textContent = 'Créer mon compte';
      return;
    }

    if (data?.user) {
      await sb.from('users').upsert({
        id: data.user.id, email, prenom, nom, role: selectedRole,
        ...(entreprise ? { entreprise } : {}),
      });
    }

    showMsg('success', '✅ Compte créé ! Vérifiez votre email pour activer votre compte.');
    btn.textContent = 'Compte créé ✓';
  });
</script>
</body>
</html>
